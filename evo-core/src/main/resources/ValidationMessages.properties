# EVO Validation Messages
#
# Jakarta Validation resolves {key} in annotation message attributes from this file.
# EvoMessages.resolve() also reads from this bundle for non-annotation paths (parse(), of()).
#
# i18n: create locale-specific variants (ValidationMessages_pt_BR.properties, etc.)
# Override: change values here, or provide locale-specific bundles.

# --- CPF ---
evo.cpf.blank=CPF must not be blank
evo.cpf.format=CPF must be exactly 11 digits
evo.cpf.allSameDigit=CPF must not have all identical digits
evo.cpf.checkDigit=CPF has invalid check digits
evo.cpf.null=CPF must not be null

# --- CNPJ ---
evo.cnpj.blank=CNPJ must not be blank
evo.cnpj.format=CNPJ must be exactly 14 digits
evo.cnpj.allSameDigit=CNPJ must not have all identical digits
evo.cnpj.checkDigit=CNPJ has invalid check digits
evo.cnpj.null=CNPJ must not be null

# --- Email ---
evo.email.blank=Email must not be blank
evo.email.format=Email must be a valid email address
evo.email.maxLength=Email must not exceed 320 characters

# --- Tax ID (CpfOrCnpj) ---
evo.taxId.blank=Tax ID must not be blank
evo.taxId.length=Tax ID must be 11 digits (CPF) or 14 digits (CNPJ), got {0}

# --- Slug ---
evo.slug.blank=Slug must not be blank
evo.slug.format=Slug must contain only lowercase alphanumeric characters and hyphens
evo.slug.maxLength=Slug must not exceed 255 characters

# --- Username ---
evo.username.blank=Username must not be blank
evo.username.format=Username must start with a letter and contain only letters, digits, hyphens, or underscores
evo.username.length=Username must be between 3 and 39 characters

# --- Area Code ---
evo.areaCode.blank=Area code must not be blank
evo.areaCode.format=Area code must be 1 to 5 digits
evo.areaCode.maxLength=Area code must not exceed 5 characters

# --- Phone Number ---
evo.phoneNumber.blank=Phone number must not be blank
evo.phoneNumber.format=Phone number must be in E.164 format (+ followed by 1 to 15 digits)
evo.phoneNumber.maxLength=Phone number must not exceed 16 characters
evo.phoneNumber.null=Phone number must not be null

# --- Country Code ---
evo.countryCode.blank=Country code must not be blank
evo.countryCode.format=Country code must be exactly 2 uppercase letters
evo.countryCode.maxLength=Country code must not exceed 2 characters
evo.countryCode.invalid=Country code is not a recognized ISO 3166-1 alpha-2 code

# --- URL ---
evo.url.blank=URL must not be blank
evo.url.format=URL must be a valid URI with a scheme
evo.url.maxLength=URL must not exceed 2083 characters

# --- IP Address ---
evo.ipAddress.blank=IP address must not be blank
evo.ipAddress.format=IP address must be a valid IPv4 or IPv6 address
evo.ipAddress.maxLength=IP address must not exceed 45 characters

# --- Shared constraints ---
evo.notAllSameDigit=must not have all identical digits
