# EVO Validation Messages
#
# Jakarta Validation resolves {key} in annotation message attributes from this file.
# EvoMessages.resolve() also reads from this bundle for non-annotation paths (parse(), of()).
#
# i18n: create locale-specific variants (ValidationMessages_pt_BR.properties, etc.)
# Override: change values here, or provide locale-specific bundles.

# --- CPF ---
evo.cpf.blank=CPF must not be blank
evo.cpf.format=CPF must be exactly 11 digits
evo.cpf.allSameDigit=CPF must not have all identical digits
evo.cpf.checkDigit=CPF has invalid check digits
evo.cpf.null=CPF must not be null

# --- CNPJ ---
evo.cnpj.blank=CNPJ must not be blank
evo.cnpj.format=CNPJ must be exactly 14 digits
evo.cnpj.allSameDigit=CNPJ must not have all identical digits
evo.cnpj.checkDigit=CNPJ has invalid check digits
evo.cnpj.null=CNPJ must not be null

# --- Email ---
evo.email.blank=Email must not be blank
evo.email.format=Email must be a valid email address
evo.email.maxLength=Email must not exceed 320 characters

# --- Tax ID (CpfOrCnpj) ---
evo.taxId.blank=Tax ID must not be blank
evo.taxId.length=Tax ID must be 11 digits (CPF) or 14 digits (CNPJ), got {0}

# --- Shared constraints ---
evo.notAllSameDigit=must not have all identical digits
